<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mulah - Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --mulah-orange: #f27c22;
            --mulah-dark-grey: #5F5B5B;
            --mulah-light-grey: #a9a9a9;
            --mulah-blue: #3A5A98;
        }

        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }

        .mobile-frame {
            width: 100%;
            max-width: 400px; 
            background-color: #ffffff;
            height: 100vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
        }

        .logo-container {
            text-align: center;
            padding-top: 50px;
            padding-bottom: 20px;
        }
        
        .logo-container h1 {
            color: var(--mulah-orange);
            font-weight: 800;
            font-size: 28px;
            letter-spacing: 2px;
            margin: 0;
        }

        .content-body {
            flex-grow: 1;
            padding: 0 35px;
        }

        .page-title {
            font-family: 'Lora', serif;
            color: var(--mulah-dark-grey);
            font-size: 32px;
            margin-bottom: 5px;
            text-align: center;
        }

        .page-subtitle {
            color: var(--mulah-orange);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
        }

        .data-card {
            background-color: #fcfcfc;
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .data-row {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .data-label {
            font-size: 12px;
            color: var(--mulah-light-grey);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 16px;
            color: var(--mulah-dark-grey);
            font-weight: 600;
            word-wrap: break-word;
        }

        .btn-outline-custom {
            border: 2px solid var(--mulah-orange);
            color: var(--mulah-orange);
            background: transparent;
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            font-size: 16px;
            margin-top: 30px;
            transition: all 0.2s;
        }

        .btn-outline-custom:hover {
            background-color: var(--mulah-orange);
            color: white;
        }

        .footer {
            text-align: center;
            padding: 25px 0;
            border-top: 1px solid #f0f0f0;
            font-size: 14px;
            color: var(--mulah-light-grey);
        }

        .footer span {
            color: var(--mulah-blue);
            font-weight: 600;
        }
        .footer-link {
            color: var(--mulah-blue);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="mobile-frame">
        <div class="logo-container">
            <h1>MULAH</h1>
        </div>

        <div class="content-body">
            <h2 class="page-title">Summary</h2>
            <div class="page-subtitle">Here are your details</div>

            <div class="data-card">
                <div class="data-row">
                    <div class="data-label">Phone Number</div>
                    <div class="data-value" id="displayPhone">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">Full Name</div>
                    <div class="data-value" id="displayName">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">Birthday</div>
                    <div class="data-value" id="displayBirthday">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">Email Address</div>
                    <div class="data-value" id="displayEmail">-</div>
                </div>
            </div>

            <button onclick="window.location.href='index.html'" class="btn-outline-custom">Start Over</button>
        </div>

        <div class="footer">
            Powered by 
            <a href="https://www.mulahrewards.com/" target="_blank" style="color: inherit; font-weight: 600; text-decoration: none;">
                <span>MulahRewards.com</span>
            </a>
        </div>
    </div>

    <script>
        // Retrieve data from sessionStorage and display it
        document.addEventListener('DOMContentLoaded', () => {
            const phone = sessionStorage.getItem('phone') || 'Not provided';
            const name = sessionStorage.getItem('mulah_name') || 'Not provided';
            const birthday = sessionStorage.getItem('mulah_birthday') || 'Not provided';
            const email = sessionStorage.getItem('mulah_email') || 'Not provided';

            document.getElementById('displayPhone').innerText = phone;
            document.getElementById('displayName').innerText = name;
            document.getElementById('displayBirthday').innerText = birthday;
            document.getElementById('displayEmail').innerText = email;
        });
    </script>
</body>
</html>
